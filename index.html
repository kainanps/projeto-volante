<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volante Web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #222;
            color: white;
            margin: 0;
            overflow: hidden;
        }
        button {
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            margin-bottom: 20px;
            cursor: pointer;
        }
        #status { font-size: 18px; color: #ffeb3b; margin-bottom: 10px; }
        .dado { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .label { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <button id="btnIniciar">Iniciar Volante</button>
    <div id="status">Aguardando...</div>
    
    <div class="label">DIREÇÃO</div>
    <div id="divVolante" class="dado">0°</div>
    
    <div class="label">PEDAIS</div>
    <div id="divPedal" class="dado">Neutro</div>

    <script>
        // === COLOQUE O IP DO SEU COMPUTADOR AQUI ===
        const ipComputador = "192.168.1.XXX"; 
        const porta = "8080";
        
        let ws;
        const statusDiv = document.getElementById('status');
        const divVolante = document.getElementById('divVolante');
        const divPedal = document.getElementById('divPedal');
        const btnIniciar = document.getElementById('btnIniciar');

        function conectarWebSocket() {
            ws = new WebSocket(`ws://${ipComputador}:${porta}`);
            
            ws.onopen = () => {
                statusDiv.innerText = "✅ Conectado ao PC!";
                statusDiv.style.color = "#4CAF50";
            };
            
            ws.onclose = () => {
                statusDiv.innerText = "❌ Desconectado. Tentando novamente...";
                statusDiv.style.color = "#f44336";
                setTimeout(conectarWebSocket, 2000);
            };
        }

        function processarSensores(evento) {
            // Em modo paisagem, Beta costuma ser o giro e Gamma a inclinação frontal.
            let giro = Math.round(evento.beta); 
            let inclinacao_frontal = Math.round(evento.gamma);

            divVolante.innerText = `${giro}°`;
            
            // Texto visual na tela do celular para ajudar a entender o que está acontecendo
            if (inclinacao_frontal > 15) divPedal.innerText = "Acelerando ⬆️";
            else if (inclinacao_frontal < -15) divPedal.innerText = "Ré / Freio ⬇️";
            else divPedal.innerText = "Neutro ⏹️";

            if (ws && ws.readyState === WebSocket.OPEN) {
                // Envia os dois comandos ao mesmo tempo
                ws.send(JSON.stringify({ 
                    volante: giro,
                    pedal: inclinacao_frontal
                }));
            }
        }

        btnIniciar.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissao => {
                        if (permissao === 'granted') {
                            window.addEventListener('deviceorientation', processarSensores);
                            conectarWebSocket();
                            btnIniciar.style.display = 'none';
                        }
                    }).catch(console.error);
            } else {
                window.addEventListener('deviceorientation', processarSensores);
                conectarWebSocket();
                btnIniciar.style.display = 'none';
            }
        });
    </script>
</body>
</html>
