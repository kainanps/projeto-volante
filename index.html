<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volante Web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            height: 100vh;
            width: 100vw;
            /* Impede seleções acidentais de texto ao apertar os botões */
            user-select: none; 
        }
        
        /* Layout de 3 colunas: Freio | Painel Central | Acelerador */
        .area-botao {
            width: 30%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        #btnFreio {
            background-color: #f44336; /* Vermelho */
            border-right: 5px solid #b71c1c;
        }
        
        /* Efeito visual de apertar o botão */
        #btnFreio:active { background-color: #d32f2f; }

        #btnAcelerar {
            background-color: #4CAF50; /* Verde */
            border-left: 5px solid #2e7d32;
        }
        
        #btnAcelerar:active { background-color: #388e3c; }

        .painel-central {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #333;
        }

        #btnIniciar {
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            background-color: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
        }

        #status { font-size: 16px; color: #ffeb3b; margin-bottom: 10px; text-align: center; }
        .dado { font-size: 48px; font-weight: bold; margin: 10px 0; }
        .label { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <div id="btnFreio" class="area-botao">
        Freio / Ré
    </div>

    <div class="painel-central">
        <button id="btnIniciar">Iniciar Volante</button>
        <div id="status">Aguardando...</div>
        
        <div class="label">DIREÇÃO</div>
        <div id="divVolante" class="dado">0°</div>
    </div>

    <div id="btnAcelerar" class="area-botao">
        Acelerar
    </div>

    <script>
        // === COLOQUE O IP DO SEU COMPUTADOR AQUI ===
        const ipComputador = "192.168.1.XXX"; 
        const porta = "8080";
        
        let ws;
        let estadoPedalAtual = 'neutro';

        const statusDiv = document.getElementById('status');
        const divVolante = document.getElementById('divVolante');
        const btnIniciar = document.getElementById('btnIniciar');
        const btnFreio = document.getElementById('btnFreio');
        const btnAcelerar = document.getElementById('btnAcelerar');

        function conectarWebSocket() {
            ws = new WebSocket(`ws://${ipComputador}:${porta}`);
            
            ws.onopen = () => {
                statusDiv.innerText = "✅ Conectado ao PC!";
                statusDiv.style.color = "#4CAF50";
            };
            
            ws.onclose = () => {
                statusDiv.innerText = "❌ Desconectado. Tentando novamente...";
                statusDiv.style.color = "#f44336";
                setTimeout(conectarWebSocket, 2000);
            };
        }

        // Eventos dos botões (Touch para celular, Mouse para testar no PC se quiser)
        // Acelerar
        btnAcelerar.addEventListener('touchstart', (e) => { e.preventDefault(); estadoPedalAtual = 'frente'; });
        btnAcelerar.addEventListener('touchend', (e) => { e.preventDefault(); estadoPedalAtual = 'neutro'; });
        btnAcelerar.addEventListener('mousedown', (e) => { estadoPedalAtual = 'frente'; });
        btnAcelerar.addEventListener('mouseup', (e) => { estadoPedalAtual = 'neutro'; });

        // Freiar
        btnFreio.addEventListener('touchstart', (e) => { e.preventDefault(); estadoPedalAtual = 're'; });
        btnFreio.addEventListener('touchend', (e) => { e.preventDefault(); estadoPedalAtual = 'neutro'; });
        btnFreio.addEventListener('mousedown', (e) => { estadoPedalAtual = 're'; });
        btnFreio.addEventListener('mouseup', (e) => { estadoPedalAtual = 'neutro'; });

        function processarSensores(evento) {
            let giro = Math.round(evento.beta); 
            divVolante.innerText = `${giro}°`;

            if (ws && ws.readyState === WebSocket.OPEN) {
                // Envia a direção e o estado dos botões de uma vez
                ws.send(JSON.stringify({ 
                    volante: giro,
                    pedal: estadoPedalAtual
                }));
            }
        }

        btnIniciar.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissao => {
                        if (permissao === 'granted') {
                            window.addEventListener('deviceorientation', processarSensores);
                            conectarWebSocket();
                            btnIniciar.style.display = 'none';
                        }
                    }).catch(console.error);
            } else {
                window.addEventListener('deviceorientation', processarSensores);
                conectarWebSocket();
                btnIniciar.style.display = 'none';
            }
        });
    </script>
</body>
</html>
